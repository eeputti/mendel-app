name: Mendel
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.dipworks.mendel
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: '1,2'
configs:
  Debug: debug
  Release: release
targets:
  Mendel:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Mendel/Mendel
        excludes:
          - "**/AppState+*.swift"
          - "**/RootView+*.swift"
          - "**/TodayView+*.swift"
          - "**/CoachView+*.swift"
      - path: Assets.xcassets
    info:
      path: Mendel/Config/Info.plist
    entitlements:
      path: Mendel/Config/Mendel.entitlements
    settings:
      base:
        PRODUCT_NAME: Mendel
        PRODUCT_BUNDLE_IDENTIFIER: com.dipworks.mendel
        INFOPLIST_FILE: Mendel/Config/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mendel/Config/Mendel.entitlements
        DEVELOPMENT_ASSET_PATHS: '"Mendel/Preview Content"'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: MendelWidget
    scheme:
      gatherCoverageData: false
      storeKitConfiguration: Mendel.storekit
  MendelWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Mendel/MendelWidget
      - path: Mendel/Mendel/Shared/SharedRecommendation.swift
    info:
      path: Mendel/Config/MendelWidget-Info.plist
    entitlements:
      path: Mendel/Config/MendelWidget.entitlements
    settings:
      base:
        PRODUCT_NAME: MendelWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.dipworks.mendel.widget
        INFOPLIST_FILE: Mendel/Config/MendelWidget-Info.plist
        CODE_SIGN_ENTITLEMENTS: Mendel/Config/MendelWidget.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
